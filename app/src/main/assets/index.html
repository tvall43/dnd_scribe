<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>DnD Scribe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1209;
    --parchment: #f5ead6;
    --blood: #8b1a1a;
    --blood-dim: #6b1414;
    --gold: #c9973a;
    --gold-light: #e8b84b;
    --gold-dim: rgba(201,151,58,0.35);
    --glow: rgba(201,151,58,0.25);
    --ink-mid: #1e1008;
    --ink-light: #2d1a08;
    --ink-border: #3d2510;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a0f05 0%, #2d1a08 50%, #1a0f05 100%);
    border-bottom: 2px solid var(--gold);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 20px rgba(201,151,58,0.2);
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    text-shadow: 0 0 20px var(--glow), 0 1px 3px rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-controls { display: flex; align-items: center; gap: 10px; }
  .rec-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    font-weight: 600;
    border: 1.5px solid var(--blood);
    background: transparent;
    color: var(--blood);
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
  }
  .rec-btn:hover { background: rgba(139,26,26,0.15); }
  .rec-btn.recording {
    background: var(--blood);
    color: var(--parchment);
    animation: pulse-border 2s infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 8px rgba(139,26,26,0.4); }
    50% { box-shadow: 0 0 18px rgba(139,26,26,0.8); }
  }
  .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .rec-btn.recording .rec-dot { animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .settings-btn {
    background: none;
    border: 1.5px solid var(--gold-dim);
    color: var(--gold);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .settings-btn:hover { background: rgba(201,151,58,0.1); border-color: var(--gold); }

  /* ── TIMER BARS ── */
  .timer-bars { display: flex; flex-direction: column; gap: 2px; padding: 4px 0; background: var(--ink-mid); flex-shrink: 0; }
  .timer-row { display: flex; align-items: center; gap: 8px; padding: 0 12px; }
  .timer-label { font-family: 'Cinzel', serif; font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); opacity: 0.5; width: 40px; flex-shrink: 0; }
  .timer-track { flex: 1; height: 3px; background: rgba(201,151,58,0.1); border-radius: 2px; overflow: hidden; }
  .timer-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 2s linear; }
  .timer-fill.notes { background: linear-gradient(90deg, #2d5a27, #4a8a40); }
  .timer-fill.final { background: linear-gradient(90deg, var(--blood-dim), var(--blood)); }

  /* ── TABS ── */
  .tab-bar { display: flex; background: #120c04; border-bottom: 1px solid var(--gold-dim); flex-shrink: 0; }
  .tab {
    flex: 1;
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    font-weight: 600;
    text-transform: uppercase;
    color: rgba(201,151,58,0.45);
    padding: 10px 4px;
    border: none;
    background: none;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    position: relative;
  }
  .tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
  .tab:hover:not(.active) { color: rgba(201,151,58,0.75); }
  .tab-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--blood);
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ── PANES ── */
  .pane { flex: 1; display: none; flex-direction: column; overflow: hidden; background: linear-gradient(160deg, #f7ecda 0%, var(--parchment) 40%, #edddb8 100%); }
  .pane.active { display: flex; }

  .pane-scroll { flex: 1; overflow-y: auto; padding: 16px; }
  .pane-scroll::-webkit-scrollbar { width: 6px; }
  .pane-scroll::-webkit-scrollbar-thumb { background: rgba(139,90,43,0.3); border-radius: 3px; }

  /* ── TRANSCRIPT ── */
  #transcript-text {
    font-size: 1rem;
    line-height: 1.75;
    color: #2a1a08;
    font-weight: 300;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .cursor-blink {
    display: inline-block; width: 2px; height: 1em;
    background: var(--blood); vertical-align: middle;
    margin-left: 2px; animation: blink 1s infinite;
  }
  .empty-state { text-align: center; padding: 60px 20px; color: rgba(90,60,30,0.45); font-style: italic; font-size: 1.05rem; }
  .empty-rune { font-size: 3rem; display: block; margin-bottom: 12px; opacity: 0.3; }

  /* ── TOOLBARS ── */
  .pane-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    background: rgba(201,151,58,0.07);
    border-bottom: 1px solid rgba(201,151,58,0.18);
    flex-shrink: 0;
    gap: 8px;
  }
  .pane-status {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    flex: 1;
  }
  .pane-status.updating { opacity: 1; animation: flicker 1.5s infinite; }
  @keyframes flicker { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  .toolbar-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .action-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    font-weight: 600;
    text-transform: uppercase;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    padding: 4px 9px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .action-btn:hover { background: rgba(201,151,58,0.12); border-color: var(--gold); }
  .action-btn.primary { background: var(--gold); color: var(--ink); border-color: var(--gold); }
  .action-btn.primary:hover { background: var(--gold-light); }
  .action-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── EDITABLE PANE ── */
  .pane-editor {
    flex: 1;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 1rem;
    line-height: 1.8;
    color: #2a1a08;
    font-weight: 300;
    padding: 16px;
  }

  /* ── SETTINGS OVERLAY ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; }
  .overlay.open { display: flex; }
  .settings-sheet {
    width: 100%;
    background: linear-gradient(160deg, #2d1a08, #1a0f05);
    border-top: 2px solid var(--gold);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px 32px;
    max-height: 90dvh;
    overflow-y: auto;
    box-shadow: 0 -10px 60px rgba(0,0,0,0.6);
  }
  .sheet-handle { width: 40px; height: 4px; background: rgba(201,151,58,0.3); border-radius: 2px; margin: 0 auto 20px; }
  .settings-title { font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 1rem; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 20px; text-align: center; }
  .settings-section { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); opacity: 0.6; margin: 18px 0 10px; border-bottom: 1px solid var(--gold-dim); padding-bottom: 4px; }
  .field-group { margin-bottom: 12px; }
  .field-label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); opacity: 0.65; display: block; margin-bottom: 5px; }
  .field-input, .field-textarea {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dim);
    border-radius: 4px; color: var(--parchment); font-family: 'Crimson Pro', serif;
    font-size: 0.95rem; padding: 8px 12px; outline: none; transition: border-color 0.2s;
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
  .field-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .save-btn {
    width: 100%; margin-top: 14px; padding: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; border-radius: 4px; font-family: 'Cinzel', serif;
    font-size: 0.8rem; letter-spacing: 0.12em; font-weight: 700;
    color: var(--ink); cursor: pointer; text-transform: uppercase;
    box-shadow: 0 4px 15px rgba(201,151,58,0.3);
  }
  .danger-btn {
    width: 100%; margin-top: 8px; padding: 12px;
    background: transparent; border: 1px solid var(--blood);
    border-radius: 4px; font-family: 'Cinzel', serif;
    font-size: 0.8rem; letter-spacing: 0.12em; font-weight: 700;
    color: var(--blood); cursor: pointer; text-transform: uppercase;
  }
  .danger-btn:hover { background: rgba(139,26,26,0.12); }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: #1a0f05; border: 1px solid var(--gold); color: var(--parchment);
    font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.08em;
    padding: 8px 18px; border-radius: 20px; z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo"><span>⚔️</span> DnD Scribe</div>
  <div class="header-controls">
    <button class="rec-btn" id="recBtn" disabled>
      <span class="rec-dot"></span>
      <span id="recLabel">Record</span>
    </button>
    <button class="settings-btn" id="settingsGear" title="Settings">⚙</button>
  </div>
</header>

<div class="timer-bars">
  <div class="timer-row">
    <span class="timer-label">Notes</span>
    <div class="timer-track"><div class="timer-fill notes" id="notesTimerFill"></div></div>
  </div>
  <div class="timer-row">
    <span class="timer-label">Final</span>
    <div class="timer-track"><div class="timer-fill final" id="finalTimerFill"></div></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" id="tab-transcript">📜 Transcript</button>
  <button class="tab" id="tab-notes">📝 Notes</button>
  <button class="tab" id="tab-final">📖 Final</button>
  <button class="tab" id="tab-archives">🗃️ Archives</button>
</div>

<div class="pane active" id="pane-transcript">
  <div class="pane-scroll" id="transcriptScroll">
    <div id="transcript-text">
      <div class="empty-state">
        <span class="empty-rune">🎲</span>
        Press <strong>Record</strong> to begin capturing your adventure…
      </div>
    </div>
  </div>
</div>

<div class="pane" id="pane-notes">
  <div class="pane-toolbar">
    <span class="pane-status" id="notesStatus">Awaiting session…</span>
    <div class="toolbar-actions">
      <button class="action-btn" id="updateNotesBtn">Add Note Now</button>
      <button class="action-btn primary" id="copyNotesBtn">Copy</button>
    </div>
  </div>
  <textarea class="pane-editor" id="notes-editor" placeholder="Running notes will appear here as the session progresses…&#10;&#10;The scribe appends a short summary every 10 minutes, or tap 'Add Note Now' to add one immediately. You can type freely in here too."></textarea>
</div>

<div class="pane" id="pane-final">
  <div class="pane-toolbar">
    <span class="pane-status" id="finalStatus">Awaiting session…</span>
    <div class="toolbar-actions">
      <button class="action-btn" id="updateFinalBtn">Generate Now</button>
      <button class="action-btn primary" id="copyFinalBtn">Copy</button>
    </div>
  </div>
  <textarea class="pane-editor" id="final-editor" placeholder="Full session summary will appear here…&#10;&#10;Generate on demand or wait for the auto-timer. This overwrites each time — edit freely after generating."></textarea>
</div>

<div class="pane" id="pane-archives">
  <div class="pane-toolbar">
    <span class="pane-status">Manage past adventures</span>
    <div class="toolbar-actions">
      <button class="action-btn" id="btn-save-current">Save Current</button>
      <button class="action-btn" id="btn-export">Export</button>
      <label class="action-btn primary" style="cursor: pointer; margin: 0;">
        Import <input type="file" id="file-import" accept=".json" style="display: none;">
      </label>
    </div>
  </div>
  <div class="pane-scroll">
    <div id="archives-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
  </div>
</div>

<div class="overlay" id="settingsOverlay">
  <div class="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="settings-title">⚙ Scribe Configuration</div>

    <div class="settings-section">API Endpoints</div>

    <div class="field-group">
      <label class="field-label">Whisper Base URL</label>
      <input class="field-input" id="s-whisper-url" type="url" placeholder="http://10.0.0.x:8080" autocomplete="off" />
    </div>
    <div class="field-group">
      <label class="field-label">LLM Base URL</label>
      <input class="field-input" id="s-llm-url" type="url" placeholder="https://your-openwebui.example.com" autocomplete="off" />
    </div>
    <div class="field-group">
      <label class="field-label">LLM API Key</label>
      <input class="field-input" id="s-api-key" type="password" placeholder="sk-... or leave blank" autocomplete="off" />
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">LLM Model</label>
        <input class="field-input" id="s-llm-model" type="text" placeholder="mistral" />
      </div>
      <div class="field-group">
        <label class="field-label">Whisper Model</label>
        <input class="field-input" id="s-whisper-model" type="text" placeholder="base" />
      </div>
    </div>

    <div class="settings-section">Timers</div>

    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Chunk Length (sec)</label>
        <input class="field-input" id="s-chunk" type="number" min="5" max="60" />
      </div>
      <div class="field-group">
        <label class="field-label">Notes Interval (min)</label>
        <input class="field-input" id="s-notes-interval" type="number" min="1" max="60" />
      </div>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">Final Interval (min)</label>
        <input class="field-input" id="s-final-interval" type="number" min="1" max="120" />
      </div>
      <div class="field-group"></div>
    </div>

    <div class="settings-section">Notes Prompt</div>
    <div class="field-group">
      <textarea class="field-textarea" id="s-notes-prompt" rows="5"></textarea>
    </div>

    <div class="settings-section">Final Summary Prompt</div>
    <div class="field-group">
      <textarea class="field-textarea" id="s-final-prompt" rows="5"></textarea>
    </div>

    <button class="save-btn" id="saveSettingsBtn">Save & Close</button>
    <button class="danger-btn" id="clearSessionBtn">Clear Active Session</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DEFAULTS ─────────────────────────────────────────────────────────────────
var DEFAULT_NOTES_PROMPT = 'You are a D&D session scribe. Given the transcript excerpt below, write a short paragraph (4-6 sentences) summarizing what just happened. Focus on: what the party did, any NPCs they interacted with, decisions made, and anything discovered. Write in past tense. Be concise — this is a running log entry, not a full summary.';

var DEFAULT_FINAL_PROMPT = 'You are a meticulous D&D session scribe. Given the full transcript below, produce structured session notes:\n\n## Session Summary\nA 2-3 sentence narrative overview.\n\n## Key Events\n- Bullet list of major plot moments in order.\n\n## NPCs Encountered\n- Name: brief description / role / attitude\n\n## Decisions Made\n- Notable choices the party made\n\n## Loot & Discoveries\n- Items found, secrets uncovered, locations revealed\n\n## Threads & Hooks\n- Unresolved threads or hooks for next session\n\nKeep it concise but complete. Write in past tense.';

var DEFAULT_CFG = {
  whisperUrl: '',
  llmUrl: '',
  apiKey: '',
  llmModel: 'mistral',
  whisperModel: 'base',
  chunkSec: 15,
  notesIntervalMin: 10,
  finalIntervalMin: 20,
  maxNoteBufferChars: 20000,
  notesPrompt: DEFAULT_NOTES_PROMPT,
  finalPrompt: DEFAULT_FINAL_PROMPT,
};

// ── STATE ─────────────────────────────────────────────────────────────────────
var cfg = Object.assign({}, DEFAULT_CFG);
var transcript = '';
var transcriptSinceLastNote = ''; 
var recording = false;
var mediaRecorder = null;
var audioChunks = [];
var chunkTimer = null;
var notesTimer = null;
var finalTimer = null;
var notesTimerInterval = null;
var finalTimerInterval = null;
var notesTimerStart = null;
var finalTimerStart = null;
var notesUpdating = false;
var finalUpdating = false;
var activeTab = 'transcript';

// ── STORAGE & SESSION ─────────────────────────────────────────────────────────
function loadAll() {
  try {
    var savedCfg = localStorage.getItem('dnd-cfg');
    if (savedCfg) cfg = Object.assign({}, DEFAULT_CFG, JSON.parse(savedCfg));
  } catch(e) {}

  try {
    var savedSession = localStorage.getItem('dnd-session');
    if (savedSession) {
      var s = JSON.parse(savedSession);
      transcript = s.transcript || '';
      transcriptSinceLastNote = s.transcriptSinceLastNote || '';
      document.getElementById('notes-editor').value = s.notes || '';
      document.getElementById('final-editor').value = s.final || '';
      if (transcript) renderTranscript();
      if (s.notes) document.getElementById('notesStatus').textContent = 'Restored from last session';
      if (s.final) document.getElementById('finalStatus').textContent = 'Restored from last session';
    }
  } catch(e) {}
}

function saveCfg() {
  try { localStorage.setItem('dnd-cfg', JSON.stringify(cfg)); } catch(e) {}
}

function saveSession() {
  try {
    localStorage.setItem('dnd-session', JSON.stringify({
      transcript: transcript,
      transcriptSinceLastNote: transcriptSinceLastNote,
      notes: document.getElementById('notes-editor').value,
      final: document.getElementById('final-editor').value,
    }));
  } catch(e) {}
}

function clearSavedSession() {
  try { localStorage.removeItem('dnd-session'); } catch(e) {}
  transcript = '';
  transcriptSinceLastNote = '';
  document.getElementById('notes-editor').value = '';
  document.getElementById('final-editor').value = '';
  document.getElementById('notesStatus').textContent = 'Awaiting session…';
  document.getElementById('finalStatus').textContent = 'Awaiting session…';
  renderTranscript();
}

// ── ARCHIVES MANAGEMENT ───────────────────────────────────────────────────────
function getArchives() {
  try { return JSON.parse(localStorage.getItem('dnd-archives') || '[]'); }
  catch(e) { return []; }
}

function saveArchives(arr) {
  try { localStorage.setItem('dnd-archives', JSON.stringify(arr)); } catch(e) {}
}

function saveCurrentToArchives() {
  var notes = document.getElementById('notes-editor').value.trim();
  var final = document.getElementById('final-editor').value.trim();
  if (!transcript && !notes && !final) {
    showToast('⚠ Nothing to save');
    return;
  }
  var name = prompt("Name this session archive:", "Session - " + new Date().toLocaleDateString());
  if (!name) return;

  var arch = getArchives();
  arch.push({
    id: Date.now(),
    name: name,
    date: new Date().toISOString(),
    transcript: transcript,
    transcriptSinceLastNote: transcriptSinceLastNote,
    notes: notes,
    final: final
  });
  saveArchives(arch);
  renderArchives();
  showToast('Session archived ✦');
}

function renderArchives() {
  var list = document.getElementById('archives-list');
  var arch = getArchives();
  arch.sort(function(a, b) { return b.id - a.id; }); 

  if (arch.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-rune">🗃️</span>Your archives are empty.</div>';
    return;
  }

  list.innerHTML = arch.map(function(s) {
    var dateStr = new Date(s.date).toLocaleDateString();
    return '<div style="background: rgba(255,255,255,0.05); border: 1px solid var(--gold-dim); padding: 16px; border-radius: 4px;">' +
             '<div style="font-family: \'Cinzel\', serif; font-size: 0.95rem; font-weight: 600; color: var(--gold-light); margin-bottom: 4px;">' + escapeHtml(s.name) + '</div>' +
             '<div style="font-size: 0.75rem; color: var(--gold); opacity: 0.6; margin-bottom: 14px; text-transform: uppercase; font-family: \'Cinzel\', serif;">' + dateStr + '</div>' +
             '<div style="display: flex; gap: 8px;">' +
               '<button class="action-btn primary" onclick="loadArchive(' + s.id + ')">Load into Active</button>' +
               '<button class="action-btn" style="color: var(--blood); border-color: var(--blood);" onclick="deleteArchive(' + s.id + ')">Delete</button>' +
             '</div>' +
           '</div>';
  }).join('');
}

window.loadArchive = function(id) {
  if (!confirm("Overwrite your current active session data?")) return;
  var arch = getArchives();
  var s = arch.find(function(a) { return a.id === id; });
  if (s) {
    transcript = s.transcript || '';
    transcriptSinceLastNote = s.transcriptSinceLastNote || '';
    document.getElementById('notes-editor').value = s.notes || '';
    document.getElementById('final-editor').value = s.final || '';
    renderTranscript();
    saveSession();
    showToast('Archive loaded ✦');
    switchTab('transcript');
  }
};

window.deleteArchive = function(id) {
  if (!confirm("Delete this archive forever?")) return;
  var arch = getArchives().filter(function(a) { return a.id !== id; });
  saveArchives(arch);
  renderArchives();
};

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.pane').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('pane-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  var dot = document.querySelector('#tab-' + name + ' .tab-dot');
  if (dot) dot.remove();
  
  if(name === 'archives') renderArchives();
}

function markTabDirty(name) {
  if (activeTab === name) return;
  var tab = document.getElementById('tab-' + name);
  if (!tab.querySelector('.tab-dot')) {
    var dot = document.createElement('span');
    dot.className = 'tab-dot';
    tab.appendChild(dot);
  }
}

// ── RECORDING ─────────────────────────────────────────────────────────────────
function toggleRecording() {
  if (recording) stopRecording();
  else startRecording();
}

function startRecording() {
  if (!cfg.whisperUrl) { showToast('⚠ Set Whisper URL in settings'); openSettings(); return; }

  navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
    recording = true;
    document.getElementById('recBtn').classList.add('recording');
    document.getElementById('recLabel').textContent = 'Stop';

    var mimeType = getSupportedMimeType();
    mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
    audioChunks = [];

    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      if (audioChunks.length > 0) {
        var blob = new Blob(audioChunks, { type: mimeType });
        audioChunks = [];
        transcribeChunk(blob);
      }
    };

    scheduleChunk();
    scheduleNotesTimer();
    scheduleFinalTimer();
    startTimerBars();
  }).catch(function() {
    showToast('⚠ Microphone access denied');
  });
}

function stopRecording() {
  recording = false;
  document.getElementById('recBtn').classList.remove('recording');
  document.getElementById('recLabel').textContent = 'Record';
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaRecorder) mediaRecorder.stream.getTracks().forEach(function(t) { t.stop(); });
  clearTimeout(chunkTimer);
  clearTimeout(notesTimer);
  clearTimeout(finalTimer);
  clearInterval(notesTimerInterval);
  clearInterval(finalTimerInterval);
  document.getElementById('notesTimerFill').style.width = '0%';
  document.getElementById('finalTimerFill').style.width = '0%';
  saveSession();
  showToast('Session saved');
}

function scheduleChunk() {
  if (!recording) return;
  mediaRecorder.start();
  chunkTimer = setTimeout(function() {
    if (recording && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      setTimeout(scheduleChunk, 100);
    }
  }, cfg.chunkSec * 1000);
}

function getSupportedMimeType() {
  var types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
  for (var i = 0; i < types.length; i++) {
    if (MediaRecorder.isTypeSupported(types[i])) return types[i];
  }
  return 'audio/webm';
}

// ── TRANSCRIPTION ─────────────────────────────────────────────────────────────
function transcribeChunk(blob) {
  var formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', cfg.whisperModel || 'base');
  formData.append('response_format', 'json');

  fetch(cfg.whisperUrl + '/v1/audio/transcriptions', { method: 'POST', body: formData })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(data) {
      var text = (data.text || '').trim();
      if (text) {
        transcript = transcript ? transcript + ' ' + text : text;
        transcriptSinceLastNote = transcriptSinceLastNote
          ? transcriptSinceLastNote + ' ' + text
          : text;

        // safeguard: fire note early if buffer grows large
        if (
          transcriptSinceLastNote.length > (cfg.maxNoteBufferChars || 12000) &&
          !notesUpdating
        ) {
          appendNote(true); // silent auto note
        }
        renderTranscript();
        autoScroll();
        saveSession();
      }
    })
    .catch(function(e) {
      showToast('⚠ Transcription failed: ' + e.message);
    });
}

function renderTranscript() {
  var el = document.getElementById('transcript-text');
  if (!transcript) {
    el.innerHTML = '<div class="empty-state"><span class="empty-rune">🎲</span>Press <strong>Record</strong> to begin capturing your adventure…</div>';
    return;
  }
  el.innerHTML = escapeHtml(transcript) + (recording ? '<span class="cursor-blink"></span>' : '');
}

function autoScroll() {
  var el = document.getElementById('transcriptScroll');
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── LLM CALL ──────────────────────────────────────────────────────────────────
function callLLM(systemPrompt, userContent, onSuccess, onError) {
  if (!cfg.llmUrl) { onError('LLM URL not configured'); return; }

  var headers = { 'Content-Type': 'application/json' };
  if (cfg.apiKey) headers['Authorization'] = 'Bearer ' + cfg.apiKey;

  fetch(cfg.llmUrl + '/v1/chat/completions', {
    method: 'POST',
    headers: headers,
    body: JSON.stringify({
      model: cfg.llmModel || 'mistral',
      max_tokens: 1000,
      messages: [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userContent },
      ],
    }),
  })
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    var text = '';
    if (data.choices && data.choices[0] && data.choices[0].message) {
      text = (data.choices[0].message.content || '').trim();
    }
    if (!text) throw new Error('Empty response');
    onSuccess(text);
  })
  .catch(function(e) {
    onError(e.message);
  });
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function scheduleNotesTimer() {
  notesTimerStart = Date.now();
  var ms = cfg.notesIntervalMin * 60 * 1000;
  notesTimer = setTimeout(function() {
    if (recording) {
      appendNote();
      scheduleNotesTimer();
    }
  }, ms);
}

function appendNote(silent) {
  if (notesUpdating) { if (!silent) showToast('Already updating notes…'); return; }
  if (!transcriptSinceLastNote) { if (!silent) showToast('⚠ No new transcript since last note'); return; }
  if (!cfg.llmUrl) { if (!silent) showToast('⚠ Set LLM URL in settings'); openSettings(); return; }

  notesUpdating = true;
  var statusEl = document.getElementById('notesStatus');
  statusEl.textContent = '✦ Scribing…';
  statusEl.classList.add('updating');

  var chunk = transcriptSinceLastNote;

  callLLM(
    cfg.notesPrompt,
    'Transcript excerpt:\n\n' + chunk,
    function(text) {
      var now = new Date();
      var timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      var editor = document.getElementById('notes-editor');
      var existing = editor.value;
      var entry = '— ' + timeStr + ' —\n' + text;
      editor.value = existing ? existing + '\n\n' + entry : entry;
      transcriptSinceLastNote = '';
      notesTimerStart = Date.now();
      saveSession();
      showToast('📝 Notes updated');
      statusEl.textContent = 'Last note at ' + timeStr;
      markTabDirty('notes');
      notesUpdating = false;
      statusEl.classList.remove('updating');
    },
    function(err) {
      showToast('⚠ Notes failed: ' + err);
      statusEl.textContent = 'Update failed';
      notesUpdating = false;
      statusEl.classList.remove('updating');
    }
  );
}

// ── FINAL SUMMARY ─────────────────────────────────────────────────────────────
function scheduleFinalTimer() {
  finalTimerStart = Date.now();
  var ms = cfg.finalIntervalMin * 60 * 1000;
  finalTimer = setTimeout(function() {
    if (recording) {
      generateFinal(true);
      scheduleFinalTimer();
    }
  }, ms);
}

function generateFinal(silent) {
  if (finalUpdating) { if (!silent) showToast('Already generating…'); return; }
  if (!transcript) { if (!silent) showToast('⚠ No transcript yet'); return; }
  if (!cfg.llmUrl) { if (!silent) showToast('⚠ Set LLM URL in settings'); openSettings(); return; }

  finalUpdating = true;
  var statusEl = document.getElementById('finalStatus');
  statusEl.textContent = '✦ Consulting the oracle…';
  statusEl.classList.add('updating');

  var notes = document.getElementById('notes-editor').value.trim();

  callLLM(
    cfg.finalPrompt,
    'Full session notes:\n\n' + notes,
    function(text) {
      document.getElementById('final-editor').value = text;
      finalTimerStart = Date.now();
      saveSession();
      showToast('📖 Final summary updated');
      var timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      statusEl.textContent = 'Generated at ' + timeStr;
      markTabDirty('final');
      finalUpdating = false;
      statusEl.classList.remove('updating');
    },
    function(err) {
      showToast('⚠ Final summary failed: ' + err);
      statusEl.textContent = 'Generation failed';
      finalUpdating = false;
      statusEl.classList.remove('updating');
    }
  );
}

// ── TIMER BARS ────────────────────────────────────────────────────────────────
function startTimerBars() {
  notesTimerStart = Date.now();
  finalTimerStart = Date.now();

  clearInterval(notesTimerInterval);
  clearInterval(finalTimerInterval);

  var noteMs = cfg.notesIntervalMin * 60 * 1000;
  notesTimerInterval = setInterval(function() {
    if (!recording) return;
    var pct = Math.min((Date.now() - notesTimerStart) / noteMs * 100, 100);
    document.getElementById('notesTimerFill').style.width = pct + '%';
    var rem = Math.max(0, Math.ceil((noteMs - (Date.now() - notesTimerStart)) / 60000));
    if (!notesUpdating) document.getElementById('notesStatus').textContent = 'Next note in ~' + rem + 'm';
  }, 5000);

  var finalMs = cfg.finalIntervalMin * 60 * 1000;
  finalTimerInterval = setInterval(function() {
    if (!recording) return;
    var pct = Math.min((Date.now() - finalTimerStart) / finalMs * 100, 100);
    document.getElementById('finalTimerFill').style.width = pct + '%';
    var rem = Math.max(0, Math.ceil((finalMs - (Date.now() - finalTimerStart)) / 60000));
    if (!finalUpdating) document.getElementById('finalStatus').textContent = 'Next update in ~' + rem + 'm';
  }, 5000);
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSettings() {
  document.getElementById('s-whisper-url').value = cfg.whisperUrl || '';
  document.getElementById('s-llm-url').value = cfg.llmUrl || '';
  document.getElementById('s-api-key').value = cfg.apiKey || '';
  document.getElementById('s-llm-model').value = cfg.llmModel || 'mistral';
  document.getElementById('s-whisper-model').value = cfg.whisperModel || 'base';
  document.getElementById('s-chunk').value = cfg.chunkSec || 15;
  document.getElementById('s-notes-interval').value = cfg.notesIntervalMin || 10;
  document.getElementById('s-final-interval').value = cfg.finalIntervalMin || 20;
  document.getElementById('s-notes-prompt').value = cfg.notesPrompt || DEFAULT_NOTES_PROMPT;
  document.getElementById('s-final-prompt').value = cfg.finalPrompt || DEFAULT_FINAL_PROMPT;
  document.getElementById('settingsOverlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('open');
}

function saveSettings() {
  cfg.whisperUrl = (document.getElementById('s-whisper-url').value || '').replace(/\/$/, '');
  cfg.llmUrl = (document.getElementById('s-llm-url').value || '').replace(/\/$/, '');
  cfg.apiKey = document.getElementById('s-api-key').value || '';
  cfg.llmModel = document.getElementById('s-llm-model').value || 'mistral';
  cfg.whisperModel = document.getElementById('s-whisper-model').value || 'base';
  cfg.chunkSec = parseInt(document.getElementById('s-chunk').value) || 15;
  cfg.notesIntervalMin = parseInt(document.getElementById('s-notes-interval').value) || 10;
  cfg.finalIntervalMin = parseInt(document.getElementById('s-final-interval').value) || 20;
  cfg.notesPrompt = document.getElementById('s-notes-prompt').value || DEFAULT_NOTES_PROMPT;
  cfg.finalPrompt = document.getElementById('s-final-prompt').value || DEFAULT_FINAL_PROMPT;
  saveCfg();
  closeSettings();
  showToast('Settings saved ✦');
}

// ── COPY ──────────────────────────────────────────────────────────────────────
function copyNotes() {
  var text = document.getElementById('notes-editor').value;
  if (!text) { showToast('⚠ No notes to copy'); return; }
  navigator.clipboard.writeText(text).then(function() { showToast('Copied ✦'); });
}

function copyFinal() {
  var text = document.getElementById('final-editor').value;
  if (!text) { showToast('⚠ No summary to copy'); return; }
  navigator.clipboard.writeText(text).then(function() { showToast('Copied ✦'); });
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadAll();

  // Top level controls
  document.getElementById('recBtn').addEventListener('click', toggleRecording);
  document.getElementById('settingsGear').addEventListener('click', openSettings);
  document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
  document.getElementById('clearSessionBtn').addEventListener('click', function() {
    if (confirm('Clear the currently active transcript and all notes?')) {
      clearSavedSession();
      closeSettings();
      showToast('Active session cleared');
    }
  });
  document.getElementById('settingsOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
  });

  // Tabs
  document.getElementById('tab-transcript').addEventListener('click', function() { switchTab('transcript'); });
  document.getElementById('tab-notes').addEventListener('click', function() { switchTab('notes'); });
  document.getElementById('tab-final').addEventListener('click', function() { switchTab('final'); });
  document.getElementById('tab-archives').addEventListener('click', function() { switchTab('archives'); });

  // Pane actions
  document.getElementById('updateNotesBtn').addEventListener('click', function() { appendNote(false); });
  document.getElementById('updateFinalBtn').addEventListener('click', function() { generateFinal(false); });
  document.getElementById('copyNotesBtn').addEventListener('click', copyNotes);
  document.getElementById('copyFinalBtn').addEventListener('click', copyFinal);

  // Archive actions
  document.getElementById('btn-save-current').addEventListener('click', saveCurrentToArchives);
  document.getElementById('btn-export').addEventListener('click', function() {
    var data = localStorage.getItem('dnd-archives') || '[]';
    var blob = new Blob([data], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'dnd_scribe_archives.json';
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('file-import').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(event) {
      try {
        var imported = JSON.parse(event.target.result);
        if (Array.isArray(imported)) {
          var existing = getArchives();
          var merged = existing.concat(imported.filter(function(imp) {
            return !existing.some(function(ex) { return ex.id === imp.id; });
          }));
          saveArchives(merged);
          renderArchives();
          showToast('Archives imported ✦');
        } else {
          showToast('⚠ Invalid file format');
        }
      } catch (err) {
        showToast('⚠ Error reading file');
      }
    };
    reader.readAsText(file);
    e.target.value = ''; 
  });

  // Editor saving
  document.getElementById('notes-editor').addEventListener('input', saveSession);
  document.getElementById('final-editor').addEventListener('input', saveSession);

  if (!cfg.whisperUrl || !cfg.llmUrl) {
    setTimeout(function() { showToast('⚙ Configure your API URLs to begin'); }, 800);
  }
});
</script>
